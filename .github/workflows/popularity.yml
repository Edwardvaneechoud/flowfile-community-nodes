name: Refresh popularity

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: popularity
  cancel-in-progress: false

jobs:
  popularity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          # Push popularity.json as the token owner (admin bypass); falls back until the secret is set.
          token: ${{ secrets.REGISTRY_PUSH_TOKEN || github.token }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Bake ratings into popularity.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/refresh_popularity.py --index index.json --out popularity.json
      - name: Commit popularity if changed
        run: |
          if git diff --quiet -- popularity.json; then
            echo "popularity.json unchanged — nothing to commit"
            exit 0
          fi
          git config user.name "flowfile-registry[bot]"
          git config user.email "flowfile-registry[bot]@users.noreply.github.com"
          git add popularity.json
          git commit -m "chore(registry): refresh popularity.json [skip ci]"
          git push
