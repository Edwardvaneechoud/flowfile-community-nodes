name: Refresh popularity

on:
  # Nightly baseline.
  schedule:
    - cron: "17 2 * * *"
  workflow_run:
    workflows: ["Build index"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: popularity
  cancel-in-progress: false

jobs:
  popularity:
    runs-on: ubuntu-latest
    # On the chained trigger, only proceed when the index build actually succeeded — a failed
    # Build index means index.json wasn't rebuilt. Scheduled / manual runs always proceed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      discussions: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          # Always take main's tip so index.json includes the node Build index just committed
          # (the workflow_run event's SHA can predate that rebuild commit), and so we are on the
          # main branch — not a detached HEAD — for the git push in "Commit popularity if changed".
          ref: main
          # Push popularity.json as the token owner (admin bypass); falls back until the secret is set.
          token: ${{ secrets.REGISTRY_PUSH_TOKEN || github.token }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Bake ratings into popularity.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/refresh_popularity.py --index index.json --out popularity.json
      - name: Commit popularity if changed
        run: |
          if git diff --quiet -- popularity.json; then
            echo "popularity.json unchanged — nothing to commit"
            exit 0
          fi
          git config user.name "flowfile-registry[bot]"
          git config user.email "flowfile-registry[bot]@users.noreply.github.com"
          git add popularity.json
          git commit -m "chore(registry): refresh popularity.json [skip ci]"
          git push
