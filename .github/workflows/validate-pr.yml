name: Validate PR

# pull_request (NOT pull_request_target): the submitted code runs only in the fork-scoped
# runner with a read-only token and no repository secrets.
on:
  pull_request:
    branches: [main]
  # Manual escape hatch: dispatch from `main` (so the CURRENT workflow runs, even when a
  # PR branch carries a stale copy) and point `ref` at the branch whose node to validate.
  workflow_dispatch:
    inputs:
      node_id:
        description: "Node folder under nodes/ to validate (e.g. kmeans_clustering)"
        required: true
      ref:
        description: "Branch/ref to check the node out from (e.g. a PR branch). Blank = this ref."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: validate-pr-${{ github.event.pull_request.number || inputs.node_id || github.run_id }}
  cancel-in-progress: true

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.dispatch.outputs.mode || steps.classify.outputs.mode }}
      node_id: ${{ steps.dispatch.outputs.node_id || steps.classify.outputs.node_id }}
    steps:
      - name: Use dispatched node
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "mode=node" >> "$GITHUB_OUTPUT"
          echo "node_id=${{ inputs.node_id }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        if: github.event_name == 'pull_request'
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Compute changed files
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --name-only "$BASE_SHA...$HEAD_SHA" > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt
      - name: Classify scope (one PR, one node)
        id: classify
        if: github.event_name == 'pull_request'
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: python .github/scope_check.py changed_files.txt --pr-author "$PR_AUTHOR"

  validate:
    needs: scope
    if: needs.scope.outputs.mode == 'node'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - name: Read config
        id: cfg
        run: echo "python=$(jq -r .python_version registry/config.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ steps.cfg.outputs.python }}
      - name: Install validator
        run: pip install "flowfile==$(jq -r .validator_flowfile_version registry/config.json)"
      - name: Validate node
        env:
          NODE_ID: ${{ needs.scope.outputs.node_id }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || github.actor }}
          TESTING: "True"
          FLOWFILE_SKIP_INIT_DB: "1"
          FLOWFILE_SKIP_STARTUP_MIGRATION: "1"
        run: |
          python -m flowfile_core.flowfile.community_nodes.cli validate "nodes/$NODE_ID" \
            --index index.json \
            --blocklist registry/blocklist.json \
            --categories registry/categories.json \
            --pr-author "$PR_AUTHOR" \
            --summary "$GITHUB_STEP_SUMMARY"

  dry-run:
    needs: [scope, validate]
    if: needs.scope.outputs.mode == 'node'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - name: Read config
        id: cfg
        run: echo "python=$(jq -r .python_version registry/config.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ steps.cfg.outputs.python }}
      - name: Install validator
        run: pip install "flowfile==$(jq -r .validator_flowfile_version registry/config.json)"
      - name: Dry-run node
        env:
          NODE_ID: ${{ needs.scope.outputs.node_id }}
          TESTING: "True"
          FLOWFILE_SKIP_INIT_DB: "1"
          FLOWFILE_SKIP_STARTUP_MIGRATION: "1"
        run: |
          python -m flowfile_core.flowfile.community_nodes.cli dry-run "nodes/$NODE_ID" \
            --install-deps \
            --timeout 120 \
            --row-limit 1000 \
            --summary "$GITHUB_STEP_SUMMARY"
