name: Build index

on:
  push:
    branches: [main]
    paths:
      - "nodes/**"
      - "registry/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: index-build
  cancel-in-progress: false

# TODO(revert before launch): install the validator from the feature branch until the
# first PyPI release exists and registry/config.json is pinned (see MAINTAINER_SETUP.md).
# Revert to `pip install "flowfile==$(jq -r .validator_flowfile_version registry/config.json)"`.
env:
  TEST_FLOWFILE_SPEC: "flowfile @ git+https://github.com/Edwardvaneechoud/Flowfile.git@feature/add-custom-node-store"

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          # Push index.json as the token owner (a repo admin who bypasses the ruleset).
          # Falls back to the default token until REGISTRY_PUSH_TOKEN is set (see MAINTAINER_SETUP.md).
          token: ${{ secrets.REGISTRY_PUSH_TOKEN || github.token }}
      - name: Read config
        id: cfg
        run: echo "python=$(jq -r .python_version registry/config.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ steps.cfg.outputs.python }}
      - name: Install validator
        run: pip install "$TEST_FLOWFILE_SPEC"
      - name: Validate all nodes (quick)
        env:
          TESTING: "True"
          FLOWFILE_SKIP_INIT_DB: "1"
          FLOWFILE_SKIP_STARTUP_MIGRATION: "1"
        run: python -m flowfile_core.flowfile.community_nodes.cli validate-all --repo-root . --quick
      - name: Rebuild index
        env:
          TESTING: "True"
          FLOWFILE_SKIP_INIT_DB: "1"
          FLOWFILE_SKIP_STARTUP_MIGRATION: "1"
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python -m flowfile_core.flowfile.community_nodes.cli build-index \
            --repo-root . \
            --previous index.json \
            --commit "$GITHUB_SHA" \
            --out index.json
      - name: Commit index if changed
        run: |
          if git diff --quiet -- index.json; then
            echo "index.json unchanged — nothing to commit"
            exit 0
          fi
          git config user.name "flowfile-registry[bot]"
          git config user.email "flowfile-registry[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "chore(registry): rebuild index.json [skip ci]"
          git push
